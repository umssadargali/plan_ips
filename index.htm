<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathurapur Payment Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .payment-card { background: #ffffff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 5px; font-size: 24px; }
        h3 { color: #7f8c8d; text-align: center; margin-top: 0; margin-bottom: 25px; font-weight: normal; }
        
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #34495e; font-size: 14px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 18px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; transition: border 0.3s; }
        select:focus, input:focus { border-color: #3498db; }

        .amount-display { background: #f8f9fa; border: 2px dashed #3498db; border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 20px; }
        .amount-display span { font-size: 22px; font-weight: bold; color: #2980b9; }

        button { width: 100%; background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2); }
        button:hover { background: #219150; }
        button:active { transform: translateY(2px); }
        
        .loading { color: #7f8c8d; font-style: italic; font-size: 12px; }
    </style>
</head>
<body onload="fetchNamesFromSheet()">

<div class="payment-card">
    <h1>Payment</h1>
    <h3>Mathurapur</h3>

    <label for="nameList">Select Name</label>
    <select id="nameList">
        <option value="">Loading names...</option>
    </select>

    <label for="plan">Select Plan</label>
    <select id="plan" onchange="updateTotal()">
        <option value="10">Basic - ₹10</option>
        <option value="20">Regular - ₹20</option>
        <option value="30">Advanced - ₹30</option>
    </select>

    <label for="students">No. of Students</label>
    <input type="number" id="students" value="1" min="1" placeholder="Enter number" oninput="updateTotal()">

    <label for="otherAmount">Enter Other Amount (Optional)</label>
    <input type="number" id="otherAmount" value="0" min="0" placeholder="0" oninput="updateTotal()">

    <div class="amount-display">
        <label style="display:inline; margin:0;">Total Payable Amount:</label><br>
        <span>₹<span id="totalLabel">10</span></span>
    </div>

    <button onclick="handlePayment()">Pay Now</button>
</div>

<script>
    // ⚠️ APNA GOOGLE SCRIPT URL YAHAN DALEN
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYQAUbbt-RwVushqgKZDqSSajrew8VyDURR1qq8mcyjP3w8TpC__f73YdOkr2dVJ0/exec"; 

    // 1. Sheet1 se names fetch karne ka function
    async function fetchNamesFromSheet() {
        try {
            const response = await fetch(SCRIPT_URL);
            const names = await response.json();
            const dropdown = document.getElementById('nameList');
            
            if (names.length > 0) {
                dropdown.innerHTML = names.map(name => `<option value="${name}">${name}</option>`).join('');
            } else {
                dropdown.innerHTML = '<option value="">No names found</option>';
            }
        } catch (error) {
            console.error("Error fetching names:", error);
            document.getElementById('nameList').innerHTML = '<option value="">Error loading list</option>';
        }
    }

    // 2. Total calculation logic
    function updateTotal() {
    const rate = parseInt(document.getElementById('plan').value) || 0;
    const count = parseInt(document.getElementById('students').value) || 0;
    const otherInput = document.getElementById('otherAmount').value;

    let finalTotal = 0;

    // Logic: Agar Other Amount mein kuch likha hai, toh wahi final hoga
    if (otherInput !== "" && parseInt(otherInput) > 0) {
        finalTotal = parseInt(otherInput);
    } else {
        finalTotal = (rate * count);
    }

    document.getElementById('totalLabel').innerText = finalTotal;
    return finalTotal;
}

    // 3. Payment handling & Sheet2 data submission
    function handlePayment() {
        const total = updateTotal();
        const userName = document.getElementById('nameList').value;
        const selectedPlan = document.getElementById('plan').options[document.getElementById('plan').selectedIndex].text;

        if (!userName) {
            alert("Please select a name first!");
            return;
        }

        // Data ko Sheet2 mein save karne ke liye backend par bhejna
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                name: userName,
                plan: selectedPlan,
                students: document.getElementById('students').value,
                extra: document.getElementById('otherAmount').value,
                total: total
            })
        });

    const upiID = "nishatbanu5@kotak";

</script>

</body>
</html>
